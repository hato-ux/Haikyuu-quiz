function rand(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function genHistory(balls, strikes) {
  if (balls === 0 && strikes === 0) return [];
  const sequence = [];
  let rB = balls, rS = strikes;
  for (let i = 0; i < balls + strikes; i++) {
    const rem = (balls + strikes) - i;
    let isSt;
    if (rB === 0) isSt = true;
    else if (rS === 0) isSt = false;
    else isSt = Math.random() < rS / rem;
    if (isSt) { sequence.push("s"); rS--; } else { sequence.push("b"); rB--; }
  }
  const sz = GRID_5x5.filter(function(z){ return z.strike; });
  const bz = GRID_5x5.filter(function(z){ return !z.strike; });
  let cumS = 0;
  return sequence.map(function(type) {
    const pitch = rand(PITCH_TYPES);
    if (type === "s") {
      const zone = rand(sz);
      const result = cumS >= 2 ? "ファウル" : "ストライク";
      if (cumS < 2) cumS++;
      return { pitch: pitch, zoneLabel: ZONE_DISPLAY[zone.id], result: result };
    } else {
      const zone = rand(bz);
      return { pitch: pitch, zoneLabel: ZONE_DISPLAY[zone.id], result: "ボール" };
    }
  });
}

function generateSituation() {
  const counts = [
    {b:0,s:0},{b:1,s:0},{b:0,s:1},{b:2,s:0},{b:1,s:1},{b:0,s:2},
    {b:3,s:0},{b:2,s:1},{b:1,s:2},{b:3,s:1},{b:2,s:2},{b:3,s:2},
  ];
  const count = rand(counts);
  const rs = rand(RUNNER_SITUATIONS);
  const outGoal = rand(rs.allowedGoals);
  const batterGoalList = BATTER_GOALS_BY_RUNNER[rs.base] || BATTER_GOALS_BY_RUNNER["走者なし"];
  const batterGoal = rand(batterGoalList);
  return {
    inning: rand(INNINGS),
    outs: rand(OUTS_LIST),
    score: rand(SCORES),
    runnerBase: rs.base,
    runnerDetail: rs.detail,
    batter: rand(BATTER_PROFILES),
    pitcherHand: rand(PITCHER_HANDS),
    control: rand(CONTROL_LEVELS),
    count: count,
    history: genHistory(count.b, count.s),
    outGoal: outGoal,
    batterGoal: batterGoal,
    context: rand(GAME_CONTEXTS),
  };
}

async function callAPI(messages, sys, maxT) {
  // Gemini形式に変換
  const geminiMessages = messages.map(function(m) {
    return { role: m.role === "assistant" ? "model" : "user", parts: [{ text: m.content }] };
  });
  // systemプロンプトがある場合は最初のuserメッセージに付加
  if (sys && geminiMessages.length > 0 && geminiMessages[0].role === "user") {
    geminiMessages[0].parts[0].text = sys + "\n\n" + geminiMessages[0].parts[0].text;
  }
  // サーバー経由でAPIを呼び出す（キーはサーバー側で管理）
  const res = await fetch("/api/chat", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ messages: geminiMessages, maxTokens: maxT })
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data && data.error ? data.error : "HTTP " + res.status);
  return data.text;
}

    content:"0-0初球：状況によって変わる。ピンチでは「打ってもファール」になるコースへ。\n0-1：初球のとり方で判断。タイミング合ってない→同じ球種。ファウルや合った空振り→球種を変える。\n0-2追い込み：ボール球で外すのでなく「ボール球で誘う」。見せ球として使う。\n1-2追い込み：投手に余裕あり。焦ってゾーンに投げない。打者の早・遅を見極め勝負球を決める。\n2-2：圧倒的投手有利。この1球で決める意識。それまでの流れをうまく使う。\n3-2フルカウント：「ストライクを取りに来る」という打者心理を利用。ランナーなしならど真ん中に。ピンチなら球種・軌道で勝負。"
  },
  {
    title:"Level.7 打ち取り方のテクニック",
    content:"右打者をセカンドゴロに：外のストレートで99%セカンド方向へ。セカンドを1・2塁間に寄せる。\n左打者にレフトフライ：外のストレートでショート定位置から左方向へ。ショートを三遊間に。\nゴロでゲッツー：開きなくヘッドが出る→チェンジアップ系（早遅のリズム）。開きなくヘッドが出ない→インコースのストレート（遅早のリズム）。縦の半速スライダーが最も有効。\n外野フライ：バッティングのいい打者の打ち損じを外野フライに。外を攻めて外野を右（左打者なら左）方向に寄せる。\n空振り三振：前の球より質の高いボール。\n見逃し三振：全く投げていない球種・軌道。右対右のインスラ、左対左のインコース直球等。"
  },
];

function App() {
  const [page, setPage] = useState("game"); // "game" or "reference"
  const [sit, setSit] = useState(null);
  const [selPitch, setSelPitch] = useState(null);
  const [selZone, setSelZone] = useState(null);
  const [answer, setAnswer] = useState(null);
  const [loading, setLoading] = useState(false);
  const [phase, setPhase] = useState("select");
  const [tab, setTab] = useState("pitch");
  const [totalQ, setTotalQ] = useState(0);
  const [totalOK, setTotalOK] = useState(0);
  const [chatMsgs, setChatMsgs] = useState([]);
  const [chatIn, setChatIn] = useState("");
  const [chatLoad, setChatLoad] = useState(false);
  const [refSection, setRefSection] = useState(0);

  useEffect(function() { newQ(); }, []);

  function newQ() {
    setSit(generateSituation());
    setSelPitch(null); setSelZone(null); setAnswer(null);
    setPhase("select"); setTab("pitch");
    setChatMsgs([]); setChatIn("");
  }

  async function submit() {
    if (!selPitch || selZone === null) return;
    setLoading(true); setPhase("result");
    const zl = ZONE_DISPLAY[selZone];
    const isSt = GRID_5x5[selZone].strike;
    const hist = sit.history.length > 0
      ? sit.history.map(function(h,i){ return (i+1)+"球目:"+h.pitch+"→"+h.zoneLabel+"→"+h.result; }).join(", ")
      : "（初球）";
    const p =
      "あなたは高校野球の配球専門コーチです。以下の状況での投球を評価してください。\n\n" +
      "【投手】" + sit.pitcherHand + " / " + sit.control.label + "（" + sit.control.desc + "）\n" +
      "【状況】" + sit.inning + " " + sit.outs + " / " + sit.score + "\n" +
      "【走者】" + sit.runnerBase + (sit.runnerDetail ? "（" + sit.runnerDetail + "）" : "") + "\n" +
      "【打者の構えタイプ】" + sit.batter.name + "（" + sit.batter.hand + "打ち・" + sit.batter.power + "・" + sit.batter.swing + "傾向・" + sit.batter.speed + "）\n" +
      "　得意: " + sit.batter.good + " / 弱点: " + sit.batter.weak + " / 最も苦手: " + sit.batter.worstWeak + "\n" +
      "　タイミングの特徴: " + sit.batter.timing + "\n" +
      "　打者の狙い: " + sit.batterGoal + "\n" +
      "【試合の文脈】" + sit.context + "\n" +
      "【カウント】" + sit.count.b + "B-" + sit.count.s + "S\n" +
      "【配球の流れ】" + hist + "\n" +
      "【投手の目標】" + sit.outGoal + "\n" +
      "【今回投じた球】" + selPitch + " / " + zl + "（" + (isSt?"ストライク":"ボール") + "ゾーン）\n\n" +
      "以下のJSONのみ返答。前置き・マークダウン・コードブロック不要。最初の文字は{、最後は}:\n" +
      '{"rating":"○か△か×","ratingLabel":"優秀か良いか普通か惜しいか改善が必要","score":1か0,"intent":"打者の弱点とタイミングを踏まえた意図2文","evaluation":"評価2〜3文","risk":"リスク1〜2文","alternative":"代替案1〜2つ","tip":"配球の原則1文","goodExamples":[{"pitch":"球種","zone":"コース","reason":"理由1文"},{"pitch":"球種","zone":"コース","reason":"理由1文"},{"pitch":"球種","zone":"コース","reason":"理由1文"}]}';
    try {
      const txt = await callAPI([{role:"user",content:p}], null, 1200);
      // Geminiはmarkdownコードブロックで返すことがあるので除去してJSONを抽出
      const cleaned = txt.replace(/```json/g,"").replace(/```/g,"").trim();
      const m = cleaned.match(/\{[\s\S]*\}/);
      if (!m) throw new Error("The string did not match the expected pattern. Raw: " + txt.substring(0, 100));
      const parsed = JSON.parse(m[0]);
      setAnswer(parsed);
      setTotalQ(function(q){ return q+1; });
      if (parsed.score===1) setTotalOK(function(s){ return s+1; });
    } catch(e) {
      setAnswer({rating:"△",ratingLabel:"エラー",score:0,intent:"エラー: "+e.message,evaluation:"",risk:"",alternative:"",tip:"",goodExamples:[]});
    }
    setLoading(false);
  }

  async function sendChat() {
    if (!chatIn.trim() || chatLoad) return;
    const msg = chatIn.trim();
    setChatIn("");
    const msgs = [...chatMsgs, {role:"user",content:msg}];
    setChatMsgs(msgs);
    setChatLoad(true);
    const hist = sit.history.length > 0
      ? sit.history.map(function(h,i){ return (i+1)+"球目:"+h.pitch+"→"+h.result; }).join(", ") : "初球";
    const sys =
      "あなたは高校野球の配球専門コーチです。選手からの質問に状況を踏まえて日本語で答えてください。\n" +
      "投手:" + sit.pitcherHand + " " + sit.control.label + " / " +
      sit.inning + " " + sit.outs + " " + sit.score + " / 走者:" + sit.runnerBase +
      " / 打者:" + sit.batter.name + "（" + sit.batter.hand + "打ち）タイミング:" + sit.batter.timing +
      " 弱点:" + sit.batter.weak + " 最苦手:" + sit.batter.worstWeak +
      " / 打者の狙い:" + sit.batterGoal + " / 文脈:" + sit.context +
      " / カウント:" + sit.count.b + "B-" + sit.count.s + "S / 配球:" + hist +
      " / 投じた球:" + selPitch + " " + ZONE_DISPLAY[selZone] +
      (answer ? " / 評価:" + answer.rating + " " + answer.ratingLabel : "");
    try {
      const r = await callAPI(msgs, sys, 600);
      setChatMsgs([...msgs,{role:"assistant",content:r}]);
    } catch(e) {
      setChatMsgs([...msgs,{role:"assistant",content:"エラー: "+e.message}]);
    }
    setChatLoad(false);
  }

  const rc = answer && answer.rating==="○" ? "#00e676" : answer && answer.rating==="×" ? "#ff5252" : "#ffab40";
  const outsNum = sit ? parseInt(sit.outs.replace(/[^0-9]/g,"")) : 0;

  // ===== 配球論ページ =====
  if (page === "reference") {
    return (
      <div style={{minHeight:"100vh",background:"linear-gradient(160deg,#060d18 0%,#0a1628 60%,#060d18 100%)",fontFamily:"'Noto Sans JP',sans-serif",color:"#dde8f0"}}>
        <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Bebas+Neue&display=swap" rel="stylesheet"/>
        <div style={{background:"linear-gradient(90deg,#021e4a,#023a6e)",borderBottom:"1px solid rgba(0,180,220,0.3)",padding:"14px 18px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontFamily:"'Bebas Neue'",fontSize:"22px",letterSpacing:"4px",color:"#00d4ff",lineHeight:1}}>配球論 REFERENCE</div>
            <div style={{fontSize:"9px",color:"rgba(180,210,240,0.4)",letterSpacing:"2px"}}>関東学園大学附属高等学校　配球論テキスト</div>
          </div>
          <button onClick={function(){ setPage("game"); }} style={{background:"rgba(0,100,180,0.3)",border:"1px solid rgba(0,160,220,0.4)",borderRadius:"8px",padding:"8px 14px",color:"#60c8ff",fontSize:"12px",fontWeight:700,cursor:"pointer",fontFamily:"'Noto Sans JP',sans-serif"}}>
            ← 問題へ戻る
          </button>
        </div>
        <div style={{maxWidth:"600px",margin:"0 auto",padding:"12px"}}>
          {/* セクション選択 */}
          <div style={{display:"flex",gap:"4px",flexWrap:"wrap",marginBottom:"12px"}}>
            {REFERENCE_SECTIONS.map(function(s,i){
              return (
                <button key={i} onClick={function(){ setRefSection(i); }} style={{
                  padding:"5px 10px",borderRadius:"6px",border:"none",cursor:"pointer",fontSize:"10px",
                  background:refSection===i?"rgba(0,170,210,0.3)":"rgba(255,255,255,0.05)",
                  color:refSection===i?"#00d4ff":"rgba(180,210,240,0.5)",
                  fontWeight:refSection===i?700:400,fontFamily:"'Noto Sans JP',sans-serif",
                }}>
                  {s.title.split(" ")[0]}
                </button>
              );
            })}
          </div>
          {/* セクション本文 */}
          <div style={{background:"rgba(2,20,60,0.6)",border:"1px solid rgba(0,140,200,0.2)",borderRadius:"14px",padding:"18px"}}>
            <div style={{fontSize:"14px",fontWeight:700,color:"#00d4ff",marginBottom:"12px",letterSpacing:"1px"}}>{REFERENCE_SECTIONS[refSection].title}</div>
            <div style={{fontSize:"12px",lineHeight:2,color:"#a8c4de",whiteSpace:"pre-line"}}>{REFERENCE_SECTIONS[refSection].content}</div>
          </div>
          {/* 前後ナビ */}
          <div style={{display:"flex",gap:"8px",marginTop:"10px"}}>
            <button onClick={function(){ setRefSection(function(i){ return Math.max(0,i-1); }); }} disabled={refSection===0} style={{
              flex:1,padding:"10px",borderRadius:"8px",border:"none",cursor:refSection===0?"not-allowed":"pointer",
              background:refSection===0?"rgba(255,255,255,0.03)":"rgba(0,80,160,0.3)",
              color:refSection===0?"rgba(255,255,255,0.15)":"#60c8ff",fontSize:"12px",fontWeight:700,fontFamily:"'Noto Sans JP',sans-serif",
            }}>← 前へ</button>
            <button onClick={function(){ setRefSection(function(i){ return Math.min(REFERENCE_SECTIONS.length-1,i+1); }); }} disabled={refSection===REFERENCE_SECTIONS.length-1} style={{
              flex:1,padding:"10px",borderRadius:"8px",border:"none",cursor:refSection===REFERENCE_SECTIONS.length-1?"not-allowed":"pointer",
              background:refSection===REFERENCE_SECTIONS.length-1?"rgba(255,255,255,0.03)":"rgba(0,80,160,0.3)",
              color:refSection===REFERENCE_SECTIONS.length-1?"rgba(255,255,255,0.15)":"#60c8ff",fontSize:"12px",fontWeight:700,fontFamily:"'Noto Sans JP',sans-serif",
            }}>次へ →</button>
          </div>
        </div>
      </div>
    );
  }

  // ===== 問題ページ =====
  return (
    <div style={{minHeight:"100vh",background:"linear-gradient(160deg,#060d18 0%,#0a1628 60%,#060d18 100%)",fontFamily:"'Noto Sans JP',sans-serif",color:"#dde8f0"}}>
      <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Bebas+Neue&display=swap" rel="stylesheet"/>
      <style>{`*{box-sizing:border-box} @keyframes spin{to{transform:rotate(360deg)}} @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}} button{transition:all 0.15s} input{outline:none}`}</style>

      {/* ヘッダー */}
      <div style={{background:"linear-gradient(90deg,#021e4a,#023a6e)",borderBottom:"1px solid rgba(0,180,220,0.3)",padding:"14px 18px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div>
          <div style={{fontFamily:"'Bebas Neue'",fontSize:"24px",letterSpacing:"4px",color:"#00d4ff",lineHeight:1}}>HAKYUU MASTER</div>
          <div style={{fontSize:"9px",color:"rgba(180,210,240,0.4)",letterSpacing:"2px"}}>配球マスター　実戦問題集 PRO</div>
        </div>
        <div style={{display:"flex",gap:"8px",alignItems:"center"}}>
          <button onClick={function(){ setPage("reference"); }} style={{background:"rgba(0,60,120,0.4)",border:"1px solid rgba(0,140,220,0.3)",borderRadius:"7px",padding:"6px 11px",color:"#60c8ff",fontSize:"11px",fontWeight:700,cursor:"pointer",fontFamily:"'Noto Sans JP',sans-serif"}}>
            📖 配球論
          </button>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:"9px",color:"rgba(180,210,240,0.4)"}}>正解率</div>
            <div style={{fontFamily:"'Bebas Neue'",fontSize:"22px",color:"#00d4ff"}}>{totalQ>0 ? totalOK+"/"+totalQ : "―"}</div>
          </div>
        </div>
      </div>

      <div style={{maxWidth:"500px",margin:"0 auto",padding:"12px"}}>

        {/* 状況カード */}
        {sit && (
          <div style={{background:"rgba(2,20,60,0.6)",border:"1px solid rgba(0,140,200,0.2)",borderRadius:"14px",padding:"14px",marginBottom:"12px",animation:"fadeIn 0.3s ease"}}>

            {/* 投手バー */}
            <div style={{display:"flex",gap:"7px",marginBottom:"10px",flexWrap:"wrap"}}>
              <div style={{background:"rgba(0,80,160,0.35)",border:"1px solid rgba(0,140,220,0.3)",borderRadius:"7px",padding:"5px 10px",fontSize:"11px",fontWeight:700,color:"#60c8ff"}}>
                ⚾ {sit.pitcherHand}投手
              </div>
              <div style={{background:"rgba(0,0,0,0.3)",border:"1px solid rgba(255,255,255,0.12)",borderRadius:"7px",padding:"5px 10px",fontSize:"11px",fontWeight:700,color:sit.control.color}}>
                {sit.control.label}
              </div>
            </div>

            {/* 試合状況 */}
            <div style={{fontSize:"9px",color:"#00d4ff",letterSpacing:"2px",marginBottom:"7px"}}>▶ 試合状況</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"5px",marginBottom:"6px"}}>
              {[["イニング・アウト",sit.inning+" "+sit.outs],["スコア",sit.score]].map(function(x){return(
                <div key={x[0]} style={{background:"rgba(0,0,0,0.3)",borderRadius:"7px",padding:"7px 9px",borderLeft:"2px solid rgba(0,160,210,0.35)"}}>
                  <div style={{fontSize:"9px",color:"rgba(180,210,240,0.35)",marginBottom:"2px"}}>{x[0]}</div>
                  <div style={{fontSize:"12px",fontWeight:700}}>{x[1]}</div>
                </div>
              );})}
            </div>

            {/* 走者 */}
            <div style={{background:"rgba(0,0,0,0.3)",borderRadius:"7px",padding:"7px 9px",marginBottom:"6px",borderLeft:"2px solid rgba(0,160,210,0.35)"}}>
              <div style={{fontSize:"9px",color:"rgba(180,210,240,0.35)",marginBottom:"2px"}}>走者</div>
              <div style={{fontSize:"12px",fontWeight:700}}>
                {sit.runnerBase}
                {sit.runnerDetail !== "" && <span style={{fontSize:"10px",color:"#ffb74d",fontWeight:400,marginLeft:"6px"}}>▶ {sit.runnerDetail}</span>}
              </div>
            </div>

            {/* 打者プロフィール */}
            <div style={{background:"rgba(0,30,70,0.5)",borderRadius:"9px",padding:"10px 11px",marginBottom:"6px",border:"1px solid rgba(0,140,220,0.2)"}}>
              <div style={{fontSize:"9px",color:"#00d4ff",letterSpacing:"2px",marginBottom:"6px"}}>▶ 打者情報</div>
              <div style={{fontSize:"12px",fontWeight:700,marginBottom:"3px"}}>{sit.batter.name}（{sit.batter.hand}打ち・{sit.batter.power}・{sit.batter.swing}傾向）</div>
              <div style={{fontSize:"10px",color:"rgba(180,210,240,0.55)",marginBottom:"6px"}}>⏱ タイミング: {sit.batter.timing}</div>
              <div style={{display:"flex",gap:"5px",flexWrap:"wrap"}}>
                <div style={{background:"rgba(0,200,100,0.1)",border:"1px solid rgba(0,200,100,0.3)",borderRadius:"5px",padding:"3px 8px",fontSize:"10px",color:"#69f0ae"}}>得意 {sit.batter.good}</div>
                <div style={{background:"rgba(255,80,80,0.12)",border:"1px solid rgba(255,80,80,0.3)",borderRadius:"5px",padding:"3px 8px",fontSize:"10px",color:"#ff8a80"}}>弱点 {sit.batter.weak}</div>
                <div style={{background:"rgba(255,0,0,0.18)",border:"1px solid rgba(255,50,50,0.4)",borderRadius:"5px",padding:"3px 8px",fontSize:"10px",color:"#ff5252",fontWeight:700}}>最苦手 {sit.batter.worstWeak}</div>
              </div>
            </div>

            {/* 試合の文脈 */}
            <div style={{background:"rgba(80,50,0,0.3)",borderRadius:"7px",padding:"7px 10px",marginBottom:"6px",border:"1px solid rgba(255,160,0,0.2)",fontSize:"10px",color:"#ffcc80"}}>
              📋 {sit.context}
            </div>

            {/* カウント＋アウト */}
            <div style={{background:"rgba(0,0,0,0.3)",borderRadius:"9px",padding:"9px 12px",marginBottom:"6px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div>
                <div style={{display:"flex",gap:"4px",alignItems:"center",marginBottom:"5px"}}>
                  <span style={{fontSize:"9px",color:"rgba(180,210,240,0.4)",minWidth:"44px"}}>ボール</span>
                  {[0,1,2].map(function(i){return <div key={i} style={{width:"14px",height:"14px",borderRadius:"50%",background:i<sit.count.b?"#2979ff":"rgba(41,121,255,0.12)",border:"1px solid rgba(41,121,255,0.5)"}}/>;  })}
                </div>
                <div style={{display:"flex",gap:"4px",alignItems:"center",marginBottom:"5px"}}>
                  <span style={{fontSize:"9px",color:"rgba(180,210,240,0.4)",minWidth:"44px"}}>ストライク</span>
                  {[0,1].map(function(i){return <div key={i} style={{width:"14px",height:"14px",borderRadius:"50%",background:i<sit.count.s?"#ffd600":"rgba(255,214,0,0.12)",border:"1px solid rgba(255,214,0,0.5)"}}/>;  })}
                </div>
                <div style={{display:"flex",gap:"4px",alignItems:"center"}}>
                  <span style={{fontSize:"9px",color:"rgba(180,210,240,0.4)",minWidth:"44px"}}>アウト</span>
                  {[0,1].map(function(i){return <div key={i} style={{width:"14px",height:"14px",borderRadius:"3px",background:i<outsNum?"#f44336":"rgba(244,67,54,0.12)",border:"1px solid rgba(244,67,54,0.5)"}}/>;  })}
                </div>
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{fontFamily:"'Bebas Neue'",fontSize:"28px",color:"#fff",letterSpacing:"3px",lineHeight:1}}>{sit.count.b}-{sit.count.s}</div>
                <div style={{fontSize:"9px",color:"rgba(180,210,240,0.35)",marginTop:"2px"}}>B - S</div>
              </div>
            </div>

            {/* 配球の流れ */}
            {sit.history.length > 0 && (
              <div style={{background:"rgba(0,0,0,0.22)",borderRadius:"9px",padding:"9px 11px",marginBottom:"6px"}}>
                <div style={{fontSize:"9px",color:"#00d4ff",letterSpacing:"2px",marginBottom:"6px"}}>▶ ここまでの配球</div>
                {sit.history.map(function(h,i){return(
                  <div key={i} style={{display:"flex",alignItems:"center",gap:"5px",marginBottom:"3px"}}>
                    <span style={{color:"rgba(180,210,240,0.3)",minWidth:"14px",fontSize:"10px"}}>{i+1}</span>
                    <span style={{background:"rgba(0,90,170,0.35)",borderRadius:"4px",padding:"1px 6px",color:"#60c8ff",fontWeight:700,fontSize:"10px"}}>{h.pitch}</span>
                    <span style={{color:"rgba(180,210,240,0.45)",fontSize:"10px"}}>→ {h.zoneLabel}</span>
                    <span style={{marginLeft:"auto",color:h.result==="ストライク"?"#00e676":h.result==="ファウル"?"#ffb74d":"#ff6b6b",fontWeight:700,fontSize:"10px"}}>{h.result}</span>
                  </div>
                );})}
              </div>
            )}

            {/* 目標 */}
            <div style={{display:"flex",gap:"5px",flexWrap:"wrap"}}>
              <div style={{background:"rgba(100,0,170,0.2)",border:"1px solid rgba(140,40,210,0.3)",borderRadius:"6px",padding:"4px 9px",fontSize:"10px",color:"#ce93d8"}}>🎯 {sit.outGoal}</div>
              <div style={{background:"rgba(0,90,70,0.2)",border:"1px solid rgba(0,140,110,0.3)",borderRadius:"6px",padding:"4px 9px",fontSize:"10px",color:"#80cbc4"}}>🏏 {sit.batterGoal}</div>
            </div>
          </div>
        )}

        {/* 回答フェーズ */}
        {phase === "select" && (
          <div>
            <div style={{display:"flex",gap:"6px",marginBottom:"9px"}}>
              {[["pitch","⚾ 球種"],["zone","🎯 25マスコース"]].map(function(x){return(
                <button key={x[0]} onClick={function(){setTab(x[0]);}} style={{
                  flex:1,padding:"9px",border:"none",cursor:"pointer",
                  background:tab===x[0]?"rgba(0,170,210,0.18)":"rgba(255,255,255,0.03)",
                  color:tab===x[0]?"#00d4ff":"rgba(180,210,240,0.35)",
                  fontWeight:tab===x[0]?700:400,fontSize:"12px",
                  fontFamily:"'Noto Sans JP',sans-serif",borderRadius:"8px",
                  borderBottom:tab===x[0]?"2px solid #00d4ff":"2px solid transparent",
                }}>
                  {x[1]}
                  {x[0]==="pitch"&&selPitch&&<span style={{marginLeft:"5px",color:"#00e676"}}>✓</span>}
                  {x[0]==="zone"&&selZone!==null&&<span style={{marginLeft:"5px",color:"#00e676"}}>✓</span>}
                </button>
              );})}
            </div>

            {tab==="pitch"&&(
              <div style={{background:"rgba(2,15,45,0.7)",border:"1px solid rgba(0,140,200,0.18)",borderRadius:"12px",padding:"13px",marginBottom:"9px"}}>
                <div style={{fontSize:"9px",color:"#00d4ff",letterSpacing:"2px",marginBottom:"9px"}}>球種を選択</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"6px"}}>
                  {PITCH_TYPES.map(function(p){return(
                    <button key={p} onClick={function(){setSelPitch(p);}} style={{
                      padding:"10px",borderRadius:"7px",
                      border:selPitch===p?"2px solid #00d4ff":"1px solid rgba(255,255,255,0.08)",
                      background:selPitch===p?"rgba(0,170,220,0.16)":"rgba(0,0,0,0.22)",
                      color:selPitch===p?"#00d4ff":"#a0b8d0",
                      fontWeight:selPitch===p?700:400,
                      cursor:"pointer",fontSize:"13px",fontFamily:"'Noto Sans JP',sans-serif",
                    }}>{p}</button>
                  );})}
                </div>
              </div>
            )}

            {tab==="zone"&&sit&&(
              <div style={{background:"rgba(2,15,45,0.7)",border:"1px solid rgba(0,140,200,0.18)",borderRadius:"12px",padding:"13px",marginBottom:"9px"}}>
                <div style={{fontSize:"9px",color:"#00d4ff",letterSpacing:"2px",marginBottom:"9px"}}>コースを選択（5×5）</div>
                <div style={{display:"flex",justifyContent:"center"}}>
                  <div>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:"3px"}}>
                      <span style={{fontSize:"9px",color:"rgba(180,210,240,0.3)"}}>{sit.batter.hand==="右"?"← 内角":"← 外角"}</span>
                      <span style={{fontSize:"9px",color:"rgba(180,210,240,0.3)"}}>{sit.batter.hand==="右"?"外角 →":"内角 →"}</span>
                    </div>
                    <div style={{display:"grid",gridTemplateColumns:"repeat(5, 54px)",gap:"3px"}}>
                      {GRID_5x5.map(function(z){
                        const sel=selZone===z.id;
                        return(
                          <button key={z.id} onClick={function(){setSelZone(z.id);}} style={{
                            height:"44px",borderRadius:"5px",
                            border:sel?("2px solid "+(z.strike?"#00d4ff":"#ffb74d")):("1px solid "+(z.strike?"rgba(0,130,210,0.22)":"rgba(80,100,130,0.13)")),
                            background:sel?(z.strike?"rgba(0,170,220,0.22)":"rgba(255,170,50,0.18)"):(z.strike?"rgba(0,50,110,0.55)":"rgba(8,16,30,0.65)"),
                            color:sel?(z.strike?"#00d4ff":"#ffb74d"):(z.strike?"rgba(140,180,220,0.65)":"rgba(90,110,140,0.5)"),
                            cursor:"pointer",fontSize:"8px",fontFamily:"'Noto Sans JP',sans-serif",
                            fontWeight:sel?700:400,lineHeight:1.2,padding:"2px",
                          }}>{z.label}</button>
                        );
                      })}
                    </div>
                    <div style={{display:"flex",gap:"12px",marginTop:"7px",justifyContent:"center"}}>
                      <div style={{display:"flex",alignItems:"center",gap:"4px"}}>
                        <div style={{width:"10px",height:"10px",borderRadius:"2px",background:"rgba(0,50,110,0.8)",border:"1px solid rgba(0,130,210,0.35)"}}/>
                        <span style={{fontSize:"9px",color:"rgba(140,170,200,0.45)"}}>ストライク</span>
                      </div>
                      <div style={{display:"flex",alignItems:"center",gap:"4px"}}>
                        <div style={{width:"10px",height:"10px",borderRadius:"2px",background:"rgba(8,16,30,0.8)",border:"1px solid rgba(80,100,130,0.2)"}}/>
                        <span style={{fontSize:"9px",color:"rgba(140,170,200,0.45)"}}>ボール</span>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            )}

            <button onClick={submit} disabled={!selPitch||selZone===null} style={{
              width:"100%",padding:"14px",borderRadius:"9px",border:"none",
              background:selPitch&&selZone!==null?"linear-gradient(90deg,#01457a,#005f8a)":"rgba(255,255,255,0.03)",
              color:selPitch&&selZone!==null?"#fff":"rgba(255,255,255,0.18)",
              fontWeight:700,fontSize:"13px",cursor:selPitch&&selZone!==null?"pointer":"not-allowed",
              fontFamily:"'Noto Sans JP',sans-serif",letterSpacing:"0.5px",
            }}>
              {selPitch&&selZone!==null
                ? "「"+selPitch+" ／ "+(GRID_5x5[selZone]?GRID_5x5[selZone].label:"")+"」で投げる →"
                : "球種とコースを選んでください"}
            </button>
          </div>
        )}

        {/* ローディング */}
        {loading&&(
          <div style={{textAlign:"center",padding:"36px",background:"rgba(2,15,45,0.7)",borderRadius:"14px",border:"1px solid rgba(0,140,200,0.18)"}}>
            <div style={{width:"34px",height:"34px",border:"3px solid rgba(0,200,240,0.12)",borderTop:"3px solid #00d4ff",borderRadius:"50%",animation:"spin 0.7s linear infinite",margin:"0 auto 12px"}}/>
            <div style={{color:"rgba(180,210,240,0.4)",fontSize:"11px"}}>AIが配球を分析中...</div>
          </div>
        )}

        {/* 結果 */}
        {!loading&&answer&&phase==="result"&&(
          <div style={{background:"rgba(2,15,45,0.85)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:"14px",padding:"16px",animation:"fadeIn 0.3s ease"}}>
            <div style={{display:"flex",alignItems:"center",gap:"11px",marginBottom:"14px",background:"rgba(255,255,255,0.04)",borderRadius:"9px",padding:"11px 13px"}}>
              <div style={{fontFamily:"'Bebas Neue'",fontSize:"44px",color:rc,lineHeight:1}}>{answer.rating}</div>
              <div>
                <div style={{fontSize:"14px",fontWeight:700,color:rc}}>{answer.ratingLabel}</div>
                <div style={{fontSize:"10px",color:"rgba(180,210,240,0.45)",marginTop:"2px"}}>{selPitch} ／ {ZONE_DISPLAY[selZone]}</div>
              </div>
            </div>

            {[
              ["💡 配球の意図・狙い",answer.intent,"rgba(0,170,220,0.4)"],
              ["📊 評価",answer.evaluation,"rgba(80,170,80,0.4)"],
              ["⚠️ リスク・注意点",answer.risk,"rgba(255,150,0,0.4)"],
              ["🔄 他の選択肢",answer.alternative,"rgba(80,160,255,0.4)"],
              ["📌 配球の原則",answer.tip,"rgba(160,60,200,0.4)"],
            ].map(function(x){
              if(!x[1]) return null;
              return(
                <div key={x[0]} style={{marginBottom:"9px",padding:"9px 11px",background:"rgba(0,0,0,0.18)",borderRadius:"7px",borderLeft:"3px solid "+x[2]}}>
                  <div style={{fontSize:"9px",color:"rgba(180,210,240,0.35)",marginBottom:"3px"}}>{x[0]}</div>
                  <div style={{fontSize:"12px",lineHeight:1.75,color:"#a8c4de"}}>{x[1]}</div>
                </div>
              );
            })}

            {answer.goodExamples&&answer.goodExamples.length>0&&(
              <div style={{marginBottom:"9px",padding:"9px 11px",background:"rgba(0,80,40,0.2)",borderRadius:"7px",borderLeft:"3px solid rgba(0,230,118,0.5)"}}>
                <div style={{fontSize:"9px",color:"#00e676",marginBottom:"7px",fontWeight:700}}>✅ この場面での○な選択肢の例</div>
                {answer.goodExamples.map(function(ex,i){return(
                  <div key={i} style={{marginBottom:i<answer.goodExamples.length-1?"8px":"0",paddingBottom:i<answer.goodExamples.length-1?"8px":"0",borderBottom:i<answer.goodExamples.length-1?"1px solid rgba(0,230,118,0.1)":"none"}}>
                    <div style={{display:"flex",alignItems:"center",gap:"6px",marginBottom:"3px"}}>
                      <span style={{background:"rgba(0,230,118,0.15)",border:"1px solid rgba(0,230,118,0.35)",borderRadius:"4px",padding:"1px 7px",fontSize:"11px",fontWeight:700,color:"#00e676"}}>{ex.pitch}</span>
                      <span style={{fontSize:"11px",color:"rgba(180,210,240,0.5)"}}>／</span>
                      <span style={{fontSize:"11px",color:"rgba(180,210,240,0.7)"}}>{ex.zone}</span>
                    </div>
                    <div style={{fontSize:"11px",color:"rgba(160,210,180,0.8)",lineHeight:1.6}}>{ex.reason}</div>
                  </div>
                );})}
              </div>
            )}

            {/* チャット */}
            <div style={{marginTop:"12px",marginBottom:"10px"}}>
              <div style={{fontSize:"9px",color:"#00d4ff",letterSpacing:"2px",marginBottom:"8px",fontWeight:700}}>💬 この解説について質問する</div>
              {chatMsgs.length>0&&(
                <div style={{marginBottom:"8px",display:"flex",flexDirection:"column",gap:"6px",maxHeight:"260px",overflowY:"auto"}}>
                  {chatMsgs.map(function(m,i){return(
                    <div key={i} style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start"}}>
                      <div style={{
                        maxWidth:"85%",padding:"8px 11px",
                        borderRadius:m.role==="user"?"12px 12px 2px 12px":"12px 12px 12px 2px",
                        background:m.role==="user"?"rgba(0,120,200,0.4)":"rgba(0,0,0,0.3)",
                        border:m.role==="user"?"1px solid rgba(0,160,240,0.3)":"1px solid rgba(255,255,255,0.08)",
                        fontSize:"12px",lineHeight:1.65,color:m.role==="user"?"#c8e8ff":"#a8c4de",
                      }}>{m.content}</div>
                    </div>
                  );})}
                  {chatLoad&&(
                    <div style={{display:"flex",justifyContent:"flex-start"}}>
                      <div style={{padding:"8px 14px",borderRadius:"12px 12px 12px 2px",background:"rgba(0,0,0,0.3)",border:"1px solid rgba(255,255,255,0.08)",color:"rgba(180,210,240,0.5)",fontSize:"12px"}}>考え中...</div>
                    </div>
                  )}
                </div>
              )}
              <div style={{display:"flex",gap:"6px"}}>
                <input value={chatIn} onChange={function(e){setChatIn(e.target.value);}}
                  onKeyDown={function(e){if(e.key==="Enter")sendChat();}}
                  placeholder="例: このタイプにフォークが有効な理由は？"
                  style={{flex:1,padding:"10px 12px",borderRadius:"8px",border:"1px solid rgba(0,150,220,0.25)",background:"rgba(0,0,0,0.3)",color:"#dde8f0",fontSize:"12px",fontFamily:"'Noto Sans JP',sans-serif"}}
                />
                <button onClick={sendChat} disabled={!chatIn.trim()||chatLoad} style={{
                  padding:"10px 14px",borderRadius:"8px",border:"none",
                  background:chatIn.trim()&&!chatLoad?"rgba(0,150,220,0.6)":"rgba(255,255,255,0.05)",
                  color:chatIn.trim()&&!chatLoad?"#fff":"rgba(255,255,255,0.2)",
                  cursor:chatIn.trim()&&!chatLoad?"pointer":"not-allowed",fontSize:"16px",
                }}>↑</button>
              </div>
            </div>

            <button onClick={newQ} style={{
              width:"100%",padding:"12px",borderRadius:"8px",border:"none",
              background:"linear-gradient(90deg,#01457a,#005f8a)",color:"#fff",
              fontWeight:700,fontSize:"13px",cursor:"pointer",fontFamily:"'Noto Sans JP',sans-serif",
            }}>次の問題へ →</button>
          </div>
        )}
      </div>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
  </script>
</body>
</html>
